name: Fashion Trends Scraper

on:
  schedule:
    - cron: '0 0 * * *'   # midnight UTC daily
  workflow_dispatch:        # manual trigger for testing

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-trends-v2
          restore-keys: ${{ runner.os }}-pip-trends-

      - name: Install dependencies
        run: pip install requests beautifulsoup4 feedparser lxml

      - name: Run scraper
        run: python -m fashion_trends.scraper
        # Exits with code 1 if all sites return 0 results — blocks commit

      - name: Run analyzer
        run: python -m fashion_trends.analyze

      - name: Validate output
        run: |
          python -c "
          import json
          with open('trends.json') as f:
              d = json.load(f)
          assert 'macro_trends'   in d, 'missing macro_trends'
          assert 'competitor_map' in d, 'missing competitor_map'
          assert 'materials'      in d, 'missing materials'
          s = d['summary']
          print(f'[OK] trends.json valid — macro rising={s[\"macro_rising\"]} fading={s[\"macro_fading\"]} | saturated={s[\"saturated_niches\"]} | materials rising={s[\"material_rising\"]}')
          "

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trends.json trends.db
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update trends.json $(date -u +%Y-%m-%d) [skip ci]" && \
            git push
