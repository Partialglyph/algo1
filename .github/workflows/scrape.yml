name: Fashion Trends Scraper

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to commit trends.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-playwright-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-playwright-

      - name: Install Python dependencies
        run: |
          pip install playwright playwright-stealth

      - name: Install Chromium browser
        run: |
          playwright install chromium --with-deps

      - name: Run scraper
        id: scrape
        run: python -m fashion_trends.scraper
        # If scraper raises SystemExit (0 results from all sites),
        # this step fails and the job stops — trends.json is NOT committed.

      - name: Run analyzer
        run: python -m fashion_trends.analyze

      - name: Validate output
        run: |
          python -c "
          import json, sys
          with open('trends.json') as f:
              d = json.load(f)
          assert 'keywords' in d, 'missing keywords'
          assert 'summary' in d, 'missing summary'
          assert len(d['keywords']) > 0, 'empty keywords list'
          print(f'[OK] trends.json valid — {len(d[\"keywords\"])} keywords, '
                f'{d[\"summary\"][\"rising_count\"]} rising, '
                f'{d[\"summary\"][\"fading_count\"]} fading')
          "

      - name: Commit updated trends.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trends.json trends.db
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update trends.json $(date -u +%Y-%m-%d) [skip ci]" && \
            git push
